<!doctype html>
<html lang="en">
  <head>
    <title>Plant Medkit</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Coming+Soon&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="header-row">
      <h1 class="coming-soon-regular">Plant Medkit</h1>
      <img
        class="header-image"
        src="images/plant-man.png"
        width="95"
        height="200"
        alt="plant man"
      />
    </div>
    <p class="coming-soon-regular">what is ur plant trying to tell you?</p>
    <div class="leafs">
      <div class="leaf-item">
        <a href="brown.html"
          ><img class="leaf" src="images/leafs/brown.PNG" alt="Brown leaf"
        /></a>
        <p class="leaf-label">brown</p>
      </div>
      <div class="leaf-item">
        <a href="yellow.html"
          ><img class="leaf" src="images/leafs/yellow.PNG" alt="Yellow leaf"
        /></a>
        <p class="leaf-label">yellow</p>
      </div>
      <div class="leaf-item">
        <a href="dead.html"
          ><img class="leaf" src="images/leafs/dead.PNG" alt="Dead leaf"
        /></a>
        <p class="leaf-label">very dead</p>
      </div>
      <div class="leaf-item">
        <a href="brown-edges.html"
          ><img
            class="leaf"
            src="images/leafs/burnt edges.PNG"
            alt="Brown edges leaf"
        /></a>
        <p class="leaf-label">brown edges</p>
      </div>
      <div class="leaf-item">
        <a href="droopy.html"
          ><img class="leaf" src="images/leafs/droopy.PNG" alt="Droopy leaf"
        /></a>
        <p class="leaf-label">droopy</p>
      </div>
      <div class="leaf-item">
        <a href="falling.html"
          ><img class="leaf" src="images/leafs/falling.PNG" alt="Falling leaf"
        /></a>
        <p class="leaf-label">falling</p>
      </div>
      <div class="leaf-item">
        <a href="holey.html"
          ><img class="leaf" src="images/leafs/Holey.PNG" alt="Holey leaf"
        /></a>
        <p class="leaf-label">holey</p>
      </div>
      <div class="leaf-item">
        <a href="spotty.html"
          ><img class="leaf" src="images/leafs/spotty.PNG" alt="Spotty leaf"
        /></a>
        <p class="leaf-label">spotty</p>
      </div>
    </div>
  </body>
</html>
