<!doctype html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Coming+Soon&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="header-row">
      <h1 class="coming-soon-regular">Plant medkit</h1>
      <img
        class="header-image"
        src="images/plant-man.png"
        width="95"
        height="200"
      />
    </div>
    <p class="coming-soon-regular">what is ur plant trying to tell you?</p>
    <div class="leafs">
      <div class="leaf-item">
        <img class="leaf" src="images/leafs/brown.PNG" />
        <p class="leaf-label">brown</p>
      </div>
      <div class="leaf-item">
        <img class="leaf" src="images/leafs/yellow.PNG" />
        <p class="leaf-label">yellow</p>
      </div>
      <div class="leaf-item">
        <img class="leaf" src="images/leafs/green.PNG" />
        <p class="leaf-label">green</p>
      </div>
      <div class="leaf-item">
        <img class="leaf" src="images/leafs/burnt edges.PNG" />
        <p class="leaf-label">brown edges</p>
      </div>
      <div class="leaf-item">
        <img class="leaf" src="images/leafs/snail.PNG" />
        <p class="leaf-label">snail trails</p>
      </div>
      <div class="leaf-item">
        <img class="leaf" src="images/leafs/moldy.PNG" />
        <p class="leaf-label">moldy</p>
      </div>
      <div class="leaf-item">
        <img class="leaf" src="images/leafs/Holey.PNG" />
        <p class="leaf-label">holey</p>
      </div>
      <div class="leaf-item">
        <img class="leaf" src="images/leafs/spotty.PNG" />
        <p class="leaf-label">spotty</p>
      </div>
    </div>
  </body>
</html>
